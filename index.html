<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Peddy Paper FMUP</title>
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 350px;
    }
    button {
      padding: 10px 15px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
    input {
      margin-top: 10px;
    }
    .progress {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title"></h2>
  <p id="mission"></p>

  <div class="progress" id="progress"></div>
  
  <label>
    <input type="checkbox" id="check"> Missão concluída
  </label>
  <br>
  <button onclick="nextStep()">Próximo</button>

  <div id="final" class="hidden">
    <h2>Checkpoint Final</h2>
    <p>Em que ano foi fundada a FMUP?</p>
    <input type="text" id="password" placeholder="Password">
    <br>
    <button onclick="checkPassword()">Entrar</button>

    <div id="result" class="hidden">
      <p>Coordenadas: <b>41.13723738118251, -8.609208661295579</b></p>
      <p>Último desafio desbloqueado 👀</p>
    </div>

    <p id="error" style="color:red;"></p>
  </div>
</div>

<script>
  var defaultSteps = [
    { title: "ICBAS", mission: "Postar story no insta de foto de grupo à frente do ICBAS a marcar @medicina_uporto" },
    { title: "Baixa do Porto", mission: "Pedir uma mensagem a um comerciante para dizer no final" },
    { title: "Palácio da Bolsa", mission: "Resolver palavras cruzadas académicas" },
    { title: "Clérigos / Fonte dos Leões", mission: "Fazer um FRA completo com capa improvisada" },
    { title: "Aliados", mission: "Tirar foto com um turista" },
    { title: "Sé do Porto", mission: "Responder a 5 perguntas académicas" }
  ];

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  var steps;

  // Criar ID único por equipa/dispositivo
  function getDeviceId() {
    let id = localStorage.getItem("deviceId");
    if (!id) {
      id = Math.random().toString(36).substring(2, 10);
      localStorage.setItem("deviceId", id);
    }
    return id;
  }

  const deviceId = getDeviceId();

  // Cada dispositivo tem a sua própria ordem e progresso
  if (!localStorage.getItem("steps_" + deviceId)) {
    steps = [...defaultSteps];
    shuffle(steps);
    localStorage.setItem("steps_" + deviceId, JSON.stringify(steps));
    localStorage.setItem("current_" + deviceId, 0);
  } else {
    steps = JSON.parse(localStorage.getItem("steps_" + deviceId));
  }

  var current = parseInt(localStorage.getItem("current_" + deviceId)) || 0;

// evitar valores bugados
if (current > steps.length) {
  current = steps.length;
}

  function render() {
  if (current < steps.length) {
    document.getElementById("title").innerText = steps[current].title;
    document.getElementById("mission").innerText = steps[current].mission;
    document.getElementById("progress").innerText = `Local ${current + 1} de ${steps.length}`;
  } else {
    // já terminou → mostrar final direto
    document.getElementById("title").classList.add("hidden");
    document.getElementById("mission").classList.add("hidden");
    document.getElementById("progress").classList.add("hidden");
    document.getElementById("check").parentElement.classList.add("hidden");
    document.querySelector("button").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");
  }
}

  render();

  function nextStep() {
    var check = document.getElementById("check");

    if (!check.checked) {
      alert("Tens de completar o objetivo primeiro");
      return;
    }

    current++;
    localStorage.setItem("current_" + deviceId, current);
    check.checked = false;

    if (current < steps.length) {
      render();
    } else {
      document.getElementById("title").classList.add("hidden");
      document.getElementById("mission").classList.add("hidden");
      document.getElementById("progress").classList.add("hidden");
      check.parentElement.classList.add("hidden");
      document.querySelector("button").classList.add("hidden");
      document.getElementById("final").classList.remove("hidden");
    }
  }

  function checkPassword() {
    var input = document.getElementById("password").value.toLowerCase().trim();

    if (input === "1825") {
      document.getElementById("result").classList.remove("hidden");
      document.getElementById("error").innerText = "";
    } else {
      document.getElementById("error").innerText = "Password errada";
    }
  }
</script>

</body>
</html>
